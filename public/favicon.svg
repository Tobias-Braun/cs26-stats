<svg viewBox="0 0 34 34" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="conicGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5a78;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff71a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5a78;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Inner darker ring with gradient border -->
  <rect x="4" y="4" width="26" height="26" rx="8" fill="none" stroke="url(#conicGrad)" stroke-width="3" filter="url(#glow)"/>

  <!-- Center glowing dot -->
  <rect x="11" y="11" width="12" height="12" rx="6" fill="#ff5a78" filter="url(#glow)" opacity="0.95"/>
</svg>
